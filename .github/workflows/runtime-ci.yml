name: runtime-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-runtime:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run unit tests
        run: |
          python -m unittest tests.test_runtime_io

      - name: Run golden output tests
        run: |
          python -m unittest tests.test_golden

      - name: Run schema validation tests
        run: |
          python -m unittest tests.test_schemas

      - name: Run temporal trace tests
        run: |
          python -m unittest tests.test_temporal

      - name: Run fact environment tests
        run: |
          python -m unittest tests.test_facts

      - name: Smoke test validation
        run: |
          python -m gulcli validate examples/specs/basic_infer.gul.json --format json

      - name: Smoke test inference
        run: |
          python -m gulcli infer examples/specs/basic_infer.gul.json --format json --trace
