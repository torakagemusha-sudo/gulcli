name: cpp-runtime-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install C++ toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-12 cmake

      - name: Build native CLI
        run: |
          cmake -S cpp -B cpp/build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=g++-12
          cmake --build cpp/build

      - name: Install Python package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run native parity tests
        run: |
          python -m unittest tests.test_native_parity tests.test_dataset_scenarios
